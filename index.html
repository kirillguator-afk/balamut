<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METRO CASH | P2P DURAK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0a0a0c] text-gray-200 overflow-hidden font-['Inter']">
    <!-- Overlay для эффекта метро -->
    <div class="fixed inset-0 pointer-events-none z-50 opacity-10 noise-bg"></div>
    
    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 h-16 border-b border-white/10 bg-black/50 backdrop-blur-md flex items-center justify-between px-6 z-40">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold text-white shadow-[0_0_15px_rgba(220,38,38,0.5)]">M</div>
            <h1 class="font-['Share_Tech_Mono'] text-xl tracking-widest text-red-500">METRO CASH</h1>
        </div>
        <div class="flex flex-col items-end">
            <div id="user-balance" class="text-green-400 font-mono text-lg">0.00 ₽</div>
            <div id="peer-status" class="text-[9px] text-gray-500 uppercase tracking-tighter">Connecting...</div>
        </div>
    </header>

    <!-- Main Lobby -->
    <main id="lobby" class="relative pt-24 px-6 h-screen overflow-y-auto pb-20">
        <div class="max-w-md mx-auto space-y-6">
            <div class="bg-gradient-to-br from-gray-900 to-black p-6 rounded-2xl border border-white/5 shadow-2xl">
                <h2 class="text-sm uppercase text-gray-500 mb-4 tracking-widest">Создать станцию (Игру)</h2>
                <div class="space-y-4">
                    <div class="flex gap-2">
                        <button onclick="setBet(100)" class="bet-btn flex-1 py-2 rounded-lg border border-white/10 hover:bg-white/5 transition active:scale-95">100</button>
                        <button onclick="setBet(500)" class="bet-btn flex-1 py-2 rounded-lg border border-white/10 hover:bg-white/5 transition active:scale-95">500</button>
                        <button onclick="setBet(1000)" class="bet-btn flex-1 py-2 rounded-lg border border-white/10 hover:bg-white/5 transition active:scale-95">1000</button>
                    </div>
                    <input type="number" id="custom-bet" placeholder="Своя ставка..." class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500/50 transition font-mono">
                    <button id="create-game-btn" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-red-900/20 transition-all active:scale-95">
                        Опубликовать Вызов
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-sm uppercase text-gray-500 tracking-widest px-2">Активные линии</h2>
                <div id="game-list" class="space-y-3">
                    <div class="text-center py-10 text-gray-600 italic">Ожидание входящих сигналов...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Game Table (Hidden by default) -->
    <div id="game-table" class="fixed inset-0 bg-[#0a0a0c] z-50 hidden flex flex-col">
        <!-- Opponent Info -->
        <div class="p-4 flex justify-between items-center border-b border-white/5 bg-black/20">
            <div id="opponent-info" class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-800 border border-white/10 flex items-center justify-center text-xs">OPP</div>
                <div>
                    <div class="text-sm font-bold">Оппонент</div>
                    <div id="opp-cards-count" class="text-[10px] text-gray-500">Карт: 0</div>
                </div>
            </div>
            <div id="trump-indicator" class="text-2xl"></div>
        </div>

        <!-- Field -->
        <div class="flex-1 relative flex items-center justify-center p-4">
            <div id="table-cards" class="flex flex-wrap gap-4 justify-center max-w-full">
                <!-- Карты на столе -->
            </div>
            
            <!-- Deck info -->
            <div id="deck-area" class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col items-center">
                <div class="w-12 h-16 bg-gray-800 rounded border border-white/20 shadow-lg relative transform rotate-12">
                     <div id="cards-left" class="absolute inset-0 flex items-center justify-center text-[10px] font-mono">36</div>
                </div>
            </div>
        </div>

        <!-- Player Actions -->
        <div class="p-4 flex justify-center gap-4">
            <button id="take-btn" class="hidden px-6 py-2 bg-yellow-600 rounded-lg text-sm font-bold">ВЗЯТЬ</button>
            <button id="done-btn" class="hidden px-6 py-2 bg-green-600 rounded-lg text-sm font-bold">БИТО</button>
        </div>

        <!-- Player Hand -->
        <div id="player-hand-container" class="h-40 relative px-4 pb-4 overflow-x-auto">
            <div id="player-hand" class="flex justify-center -space-x-8 min-w-max h-full items-end">
                <!-- Карты игрока -->
            </div>
        </div>
    </div>

    <!-- Notification system -->
    <div id="notif-container" class="fixed bottom-4 left-4 right-4 z-[100] space-y-2 pointer-events-none"></div>

    <script src="tg_api.js"></script>
    <script src="game_engine.js"></script>
    <script src="p2p_manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
