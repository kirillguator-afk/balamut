<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METRO CASH | P2P DURAK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="bg-[#050505] text-slate-200 overflow-hidden font-sans select-none">

    <!-- Сканирующие линии метро (Overlay) -->
    <div class="scanlines"></div>

    <!-- Loading Screen -->
    <div id="loader" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-all duration-1000">
        <div class="metro-loader">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="mt-10 font-['Orbitron'] text-yellow-500 tracking-[0.5em] animate-pulse">METRO CASH</div>
        <div class="mt-2 font-['Share_Tech_Mono'] text-[10px] text-zinc-500 uppercase">Establishing secure P2P tunnel...</div>
    </div>

    <!-- Main App Container -->
    <div id="main-app" class="hidden h-screen flex flex-col opacity-0 transition-opacity duration-1000">
        
        <!-- Header -->
        <header class="h-16 border-b border-yellow-500/10 flex items-center justify-between px-6 bg-black/40 backdrop-blur-xl z-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 border border-yellow-500/50 rounded flex items-center justify-center text-yellow-500 font-bold shadow-[0_0_15px_rgba(234,179,8,0.2)]">M</div>
                <div>
                    <div class="font-['Orbitron'] font-bold text-sm tracking-widest text-white">METRO <span class="text-yellow-500">CASH</span></div>
                    <div id="peer-status" class="text-[9px] font-['Share_Tech_Mono'] text-zinc-500 uppercase flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500 block"></span> Offline
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-zinc-900/80 border border-white/5 px-4 py-2 rounded-lg">
                    <div class="text-[9px] text-zinc-500 uppercase font-bold leading-none mb-1">Ваш Баланс</div>
                    <div id="balance-val" class="text-green-400 font-['Share_Tech_Mono'] text-lg">2,450.00 ₽</div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow relative overflow-hidden">
            
            <!-- Welcome/Menu Screen -->
            <section id="screen-welcome" class="absolute inset-0 flex items-center justify-center p-6 z-20">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
                    
                    <!-- Create Card -->
                    <div class="group bg-zinc-900/40 border border-white/5 p-8 rounded-2xl hover:border-yellow-500/30 transition-all backdrop-blur-sm relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-yellow-500/5 rounded-full blur-3xl group-hover:bg-yellow-500/10 transition-all"></div>
                        <h3 class="text-2xl font-['Orbitron'] font-bold mb-2">СОЗДАТЬ</h3>
                        <p class="text-zinc-500 text-sm mb-8">Станьте хостом и ожидайте оппонента. ID будет опубликован в канале.</p>
                        <button id="btn-create-game" class="w-full py-4 bg-yellow-500 text-black font-bold rounded-xl hover:bg-yellow-400 transition-all transform active:scale-95 shadow-[0_0_20px_rgba(234,179,8,0.2)]">
                            ОТКРЫТЬ СТОЛ
                        </button>
                    </div>

                    <!-- Servers/Lobby List Card -->
                    <div class="bg-zinc-900/40 border border-white/5 p-8 rounded-2xl backdrop-blur-sm flex flex-col h-[400px]">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-xl font-['Orbitron'] font-bold">СТАНЦИИ</h3>
                            <div class="text-[10px] text-yellow-500 font-['Share_Tech_Mono'] animate-pulse">SCANNING...</div>
                        </div>
                        <div id="server-list" class="flex-grow overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                            <!-- Сервера генерируются здесь -->
                            <div class="text-center py-10 text-zinc-600 text-sm italic">Поиск активных сигналов...</div>
                        </div>
                    </div>

                </div>
            </section>

            <!-- Game Table -->
            <section id="screen-game" class="hidden absolute inset-0 bg-[#080808]">
                <!-- Фоновая сетка -->
                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20"></div>
                
                <!-- Opponent Info -->
                <div class="absolute top-6 left-1/2 -translate-x-1/2 flex flex-col items-center z-10">
                    <div class="bg-black/60 border border-white/10 px-6 py-2 rounded-full backdrop-blur-md flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                        <span id="opp-name" class="text-xs font-bold tracking-widest uppercase">Opponent</span>
                        <div class="w-px h-4 bg-white/10"></div>
                        <span id="opp-card-count" class="text-yellow-500 font-mono text-xs">6 CARDS</span>
                    </div>
                </div>

                <!-- Opponent Hand -->
                <div id="opponent-hand" class="absolute top-20 left-1/2 -translate-x-1/2 flex justify-center w-full perspective-1000">
                    <!-- Карты противника (рубашкой вверх) -->
                </div>

                <!-- Battle Area -->
                <div id="battle-ground" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div id="table-cards" class="grid grid-cols-3 gap-6 pointer-events-auto">
                        <!-- Место для игровых пар -->
                    </div>
                </div>

                <!-- Player Hand -->
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-5xl">
                    <div id="player-hand" class="flex justify-center items-end gap-[-40px] transition-all pb-12">
                        <!-- Карты игрока -->
                    </div>
                </div>

                <!-- Deck & Trump -->
                <div class="absolute right-10 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4">
                    <div id="trump-slot" class="relative w-20 h-32 border border-white/5 rounded-lg flex items-center justify-center">
                        <!-- Козырь -->
                    </div>
                    <div class="relative group">
                        <div class="w-20 h-32 bg-zinc-800 rounded-lg border-2 border-white/10 shadow-2xl flex items-center justify-center overflow-hidden">
                            <div class="text-[10px] font-bold text-zinc-600 -rotate-45">METRO</div>
                            <div id="deck-count" class="absolute inset-0 flex items-center justify-center text-xl font-bold text-white/20">24</div>
                        </div>
                    </div>
                </div>

                <!-- Game Controls -->
                <div class="absolute bottom-10 right-10 flex flex-col gap-4">
                    <div id="game-status-box" class="bg-black/80 border border-yellow-500/30 p-4 rounded-xl backdrop-blur-md min-w-[180px]">
                        <div id="turn-label" class="text-[10px] text-yellow-500 uppercase font-['Share_Tech_Mono'] mb-1">Статус ходящего</div>
                        <div id="current-action" class="text-lg font-bold uppercase tracking-tighter">ВАШ ХОД</div>
                    </div>
                    <button id="btn-game-action" class="py-4 bg-white text-black font-bold rounded-xl shadow-xl hover:scale-105 transition-all active:scale-95 disabled:opacity-50">
                        БИТО
                    </button>
                </div>
            </section>

        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div id="modal-content" class="max-w-md w-full bg-zinc-900 border border-yellow-500/20 rounded-2xl p-8 shadow-[0_0_50px_rgba(0,0,0,1)]">
            <!-- Content -->
        </div>
    </div>

    <script src="tg_api.js"></script>
    <script src="p2p_manager.js"></script>
    <script src="game_engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
